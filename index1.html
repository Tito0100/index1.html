<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>جرد مخزن</title>
<style>
body {font-family: Arial; margin:20px; background:#f5f5f5}
table {border-collapse: collapse; width:100%; background:white}
th, td {border:1px solid #ccc; padding:8px; text-align:center}
th {background:#333; color:white}
input {width:100%; border:none; text-align:center}
.highlight {background:#ffeaa7}
.result {background:#55efc4}
.total {background:#74b9ff}
</style>
</head>
<body><h2>برنامج جرد مخزن</h2><table>
<thead>
<tr>
<th>التاريخ</th>
<th>الشركة</th>
<th>المنتج</th>
<th>قيمة الفاتورة</th>
<th>عدد العبوات</th>
<th>وحدات/عبوة</th>
<th class="highlight">قيمة العبوة</th>
<th class="highlight">قيمة الوحدة</th>
<th>عبوات مخزون</th>
<th>وحدات مخزون</th>
<th class="result">إجمالي المخزون</th>
<th>عبوات مستهلكة</th>
<th>وحدات مستهلكة</th>
<th class="result">إجمالي المستهلك</th>
<th class="total">المتبقي</th>
</tr>
</thead>
<tbody>
<tr>
<td><input type="date"></td>
<td><input></td>
<td><input></td>
<td><input type="number" oninput="calc()" id="invoice"></td>
<td><input type="number" oninput="calc()" id="packs"></td>
<td><input type="number" oninput="calc()" id="unitsPerPack"></td>
<td class="highlight" id="packValue"></td>
<td class="highlight" id="unitValue"></td>
<td><input type="number" oninput="calc()" id="stockPacks"></td>
<td><input type="number" oninput="calc()" id="stockUnits"></td>
<td class="result" id="stockTotal"></td>
<td><input type="number" oninput="calc()" id="usedPacks"></td>
<td><input type="number" oninput="calc()" id="usedUnits"></td>
<td class="result" id="usedTotal"></td>
<td class="total" id="remaining"></td>
</tr>
</tbody>
</table><script>
function calc(){
let invoice = parseFloat(document.getElementById('invoice').value) || 0;
let packs = parseFloat(document.getElementById('packs').value) || 0;
let unitsPerPack = parseFloat(document.getElementById('unitsPerPack').value) || 0;

let packValue = packs ? invoice / packs : 0;
let unitValue = (packs && unitsPerPack) ? invoice / (packs * unitsPerPack) : 0;

document.getElementById('packValue').innerText = packValue.toFixed(2);
document.getElementById('unitValue').innerText = unitValue.toFixed(2);

let stockPacks = parseFloat(document.getElementById('stockPacks').value) || 0;
let stockUnits = parseFloat(document.getElementById('stockUnits').value) || 0;

let stockTotal = (stockPacks * packValue) + (stockUnits * unitValue);
document.getElementById('stockTotal').innerText = stockTotal.toFixed(2);

let usedPacks = parseFloat(document.getElementById('usedPacks').value) || 0;
let usedUnits = parseFloat(document.getElementById('usedUnits').value) || 0;

let usedTotal = (usedPacks * packValue) + (usedUnits * unitValue);
document.getElementById('usedTotal').innerText = usedTotal.toFixed(2);

let remaining = stockTotal - usedTotal;
document.getElementById('remaining').innerText = remaining.toFixed(2);
}
</script></body>
</html>
